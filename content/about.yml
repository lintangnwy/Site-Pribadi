title: About Me
description: Pelajari lebih lanjut tentang perjalanan saya sebagai Backend Engineer, fokus teknologi saya, dan semangat saya dalam membangun sistem digital yang handal.
content: |
  Halo, saya **Lintang Nur Wijaya**, seorang Backend Engineer yang saat ini menempuh pendidikan di **SMK Assalaam Bandung**. Saya memiliki minat besar dalam pengembangan sistem server-side yang efisien dan skalabel.

  Perjalanan saya dimulai dengan mempelajari dasar-dasar pemrograman di sekolah, di mana saya menemukan ketertarikan pada logika di balik layar sebuah aplikasi. Fokus utama saya adalah membangun arsitektur backend yang aman menggunakan **Java (Spring Boot)** dan **PHP (Laravel)**.

  ### Filosofi Pengembangan Saya

  Saya percaya bahwa backend yang baik adalah fondasi dari setiap aplikasi hebat. Filosofi saya berakar pada **kebersihan kode (clean code)** dan **optimalisasi performa**. Saya selalu berusaha memastikan setiap API yang saya bangun terdokumentasi dengan baik, mudah dipelihara, dan dapat menangani beban data dengan efisien.

  Saat ini, saya juga sedang memperluas wawasan saya ke dunia frontend dengan mempelajari **Nuxt.js** dan **Vue.js**, untuk memahami bagaimana data dari backend dikonsumsi dan disajikan kepada pengguna secara optimal.

  ### Apa yang Memotivasi Saya

  Hal yang paling memotivasi saya adalah tantangan dalam memecahkan masalah kompleks melalui kode. Tidak ada yang lebih memuaskan daripada melihat sistem yang saya rancang berjalan mulus dan membantu mempermudah pekerjaan orang lain.

  Terima kasih telah berkunjung. Jangan ragu untuk melihat [proyek saya](/projects) atau [menghubungi saya](/#contact) jika Anda ingin berkolaborasi!
