about:
  title: "About Me"
  description: |
    I am a Backend Engineer student at SMK Assalaam Bandung with a passion for building high-performance server-side applications.
    With expertise in Java (Spring Boot) and PHP (Laravel), I focus on creating secure, scalable, and efficient backend architectures. I am also currently exploring modern frontend technologies like Nuxt and Vue to become a more versatile developer.
