faq:
  title: Frequently Asked Questions
  description: Answers to common questions about my process and services.
  categories:
    - title: Services & Skills
      questions:
        - label: What services do you offer?
          content: |
            I specialize in Backend Development, specifically building RESTful APIs, database management, and server-side logic. My core stack includes Java Spring Boot and PHP Laravel. I also offer full-stack development services as I am proficient in Nuxt.js and Vue.js.
        - label: What is your development process like?
          content: |
            My process starts with careful system analysis and database design. I follow clean code principles and ensure that every API I build is well-documented and optimized for performance. I use Git for version control and prefer Agile methodologies for project management.
        - label: Do you work with startups?
          content: |
            Yes, I am eager to help startups build their MVP (Minimum Viable Product) or scale their existing backend infrastructure. My solid foundation in Spring Boot and Laravel allows me to deliver robust solutions quickly.

    - title: About Me
      questions:
        - label: What do you enjoy most about your work?
          content: |
            I find great satisfaction in designing complex systems that work seamlessly under the hood. There's something magical about writing clean, efficient code that powers an entire application. Building APIs that other developers love to use is my ultimate goal.
        - label: What are your hobbies outside of work?
          content: |
            When I'm not coding, I enjoy exploring the beautiful city of Bandung, playing badminton, and keeping up with the latest trends in the tech world. I'm also a fan of open-source contributions and occasionally participate in local hackathons.
